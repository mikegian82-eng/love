        /* === RIPPLE EFFECT === */
        .ripple {
            position: fixed;
            border-radius: 50%;
            background: rgba(255, 107, 157, 0.3);
            border: 1px solid rgba(255, 107, 157, 0.5);
            transform: scale(0);
            animation: rippleAnim 0.8s ease-out forwards;
