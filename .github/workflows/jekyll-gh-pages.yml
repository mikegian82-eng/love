            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        /* === NAVIGATION DOTS (hidden on phone, shown on tablet+) === */
        .nav-dots {
            position: fixed;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            display: none;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
        }

        .nav-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: transparent;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-dot.active {
            background: #ff6b9d;
            border-color: #ff6b9d;
            box-shadow: 0 0 12px rgba(255, 107, 157, 0.4);
            transform: scale(1.2);
        }

        /* === FLOATING ELEMENTS === */
        .floating-hearts-container,
        .floating-balloons-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            overflow: hidden;
        }

        /* === KEYFRAMES === */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes floatHeart {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-8px); }
        }

        /* === PARTICLE CONTAINER === */
        .particle-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 3;
            overflow: hidden;
        }

        /* === RIPPLE EFFECT === */
        .ripple {
            position: fixed;
            border-radius: 50%;
            background: rgba(255, 107, 157, 0.25);
            border: 1px solid rgba(255, 107, 157, 0.4);
            transform: scale(0);
            animation: rippleAnim 0.7s ease-out forwards;
            pointer-events: none;
            z-index: 9999;
        }

        @keyframes rippleAnim {
            to {
                transform: scale(3);
                opacity: 0;
            }
        }

        /* === CONFETTI STYLES === */
        .confetti-piece {
            position: fixed;
            pointer-events: none;
            z-index: 999;
        }

        /* === GLASS CARD FLOATING (fewer on phone) === */
        .float-glass {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            z-index: 0;
            animation: floatGlassAnim 25s ease-in-out infinite;
            display: none;
        }

        @keyframes floatGlassAnim {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-20px) rotate(90deg); }
            50% { transform: translateY(8px) rotate(180deg); }
            75% { transform: translateY(-15px) rotate(270deg); }
        }

        /* ============================================
           TABLET+ UPSCALE (min-width: 600px)
           ============================================ */
        @media (min-width: 600px) {
            section {
                padding: 40px 24px;
            }

            .moon {
